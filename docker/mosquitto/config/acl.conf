# Akun bersama untuk semua device ESP32.
# Cuma boleh publish status/sensor & subscribe command miliknya sendiri (device_id di topic).
user esp_devices
topic write silasez/device/+/status
topic write silasez/device/+/sensor
topic read  silasez/device/+/command

# Akun backend (dipakai app/mqtt/client.py) — akses penuh semua topic silasez.
user backend_admin
topic readwrite silasez/#
